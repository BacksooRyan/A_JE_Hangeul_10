name: Deploy Space Carrier Defense to GitHub Pages

on:
  push:
    branches:
      - claude/space-carrier-defense-foundation-0rmd2x
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: space-carrier-defense/package-lock.json

      - name: Install dependencies
        working-directory: space-carrier-defense
        run: npm ci

      - name: Build
        working-directory: space-carrier-defense
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: space-carrier-defense/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
